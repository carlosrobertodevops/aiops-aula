services:
  kube-news:
    build: ./src
    ports:
      - "8080:8080"
    image: fabricioveronez/kube-news:v1
    environment:
      DB_DATABASE: ${DB_DATABASE:-kubedevnews}
      DB_USERNAME: ${DB_USERNAME:-kubedevnews}
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_ME}
      DB_HOST: ${DB_HOST:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kubedevnews}
      POSTGRES_USER: ${POSTGRES_USER:-kubedevnews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubedevnews"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
